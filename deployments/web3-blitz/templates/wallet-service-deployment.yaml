apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  labels:
    app: wallet-service
    {{- include "web3-blitz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.walletService.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-etcd
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z etcd 2379; do echo waiting for etcd; sleep 2; done']
      containers:
        - name: wallet-service
          image: "{{ .Values.walletService.image.repository }}:{{ .Values.walletService.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.walletService.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 2113
              protocol: TCP
          env:
            {{- with .Values.walletService.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 2113
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 2113
            initialDelaySeconds: 5
            periodSeconds: 5