apiVersion: v1
kind: ConfigMap
metadata:
  name: web3-blitz-resources-config
  namespace: {{ .Release.Namespace }}
data:
  resources.yaml: |
    resources:
      - kind: Deployment
        name: wallet-service
        namespace: {{ .Release.Namespace }}
        on-missing: auto-heal
        max_retry: 3
        fallback: rollback

      - kind: StatefulSet
        name: postgres
        namespace: {{ .Release.Namespace }}
        on-missing: alert
        max_retry: 0
        fallback: ""