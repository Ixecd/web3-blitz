global:
  resolve_timeout: 5m

route:
  receiver: 'telegram'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: '<YOUR_TELEGRAM_BOT_TOKEN>'   # 从 @BotFather 获取
        chat_id: <YOUR_CHAT_ID>                  # 从 @userinfobot 获取，个人 chat_id 为正整数
        message: |
          🚨 *{{ .GroupLabels.alertname }}*
          {{ range .Alerts }}
          *状态*: {{ .Status }}
          *服务*: {{ .Labels.service }}
          *描述*: {{ .Annotations.description }}
          *时间*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
        parse_mode: 'Markdown'
